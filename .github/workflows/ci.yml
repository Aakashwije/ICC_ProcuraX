name: ProcuraX CI/CD Pipeline

on:
  push:
    branches: [main, develop, "aakash's-brach"]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────
  # Backend Tests
  # ──────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: procurax_backend/package-lock.json

      - name: Install dependencies
        working-directory: procurax_backend
        run: npm ci

      - name: Run unit tests
        working-directory: procurax_backend
        run: npm run test:unit

      - name: Run integration tests
        working-directory: procurax_backend
        run: npm run test:integration

      - name: Run security tests
        working-directory: procurax_backend
        run: npm run test:security

      - name: Run performance tests
        working-directory: procurax_backend
        run: npm run test:performance

      - name: Run all tests with coverage
        working-directory: procurax_backend
        run: npm run test:ci

      - name: Upload coverage report
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: procurax_backend/coverage/
          retention-days: 30

  # ──────────────────────────────────────────────────────
  # Frontend Tests
  # ──────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests (Flutter)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.1"
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: procurax_frontend
        run: flutter pub get

      - name: Analyze code
        working-directory: procurax_frontend
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        working-directory: procurax_frontend
        run: flutter test --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: procurax_frontend/coverage/
          retention-days: 30

  # ──────────────────────────────────────────────────────
  # Code Quality
  # ──────────────────────────────────────────────────────
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage-report
          path: backend-coverage

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend-coverage

      - name: Summary
        run: |
          echo "## ✅ All CI checks passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Unit Tests | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Integration Tests | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Security Tests | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Performance Tests | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage Reports | ✅ Generated |" >> $GITHUB_STEP_SUMMARY
